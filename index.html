
<!DOCTYPE html>
<html>
<head>
<title>Bewok77 Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.header{
background:black;
padding:15px;
font-size:28px;
font-weight:bold;
}

.banner{
background:linear-gradient(90deg,#ff0000,#ff6600);
padding:20px;
margin:10px;
border-radius:10px;
}

.btn{
padding:12px 30px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
}

.daftar{
background:blue;
color:white;
}

.login{
background:red;
color:white;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.game{
background:#222;
padding:20px;
border-radius:12px;
font-size:18px;
}

</style>
</head>

<body>

<div class="header">
🔥 BEWOK77 GAME
</div>

<div class="banner">
BONUS GAME SETIAP HARI
</div>

<button class="btn daftar">Daftar</button>
<button class="btn login">Login</button>

<h2>🎮 Menu Game</h2>

<div class="menu">

<div class="game">🀄 Mahjong</div>
<div class="game">🐍 Snake</div>
<div class="game">🎯 Tebak Angka</div>
<div class="game">🕹 Arcade</div>
<div class="game">⚽ Sports</div>
<div class="game">🎰 Slot</div>

</div>

</body>
</html>
