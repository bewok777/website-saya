
<!DOCTYPE html>
<html>
<head>
<title>Game Website Saya</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#222;
color:white;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:10px;
}
</style>

</head>

<body>

<h1>🎮 Tebak Angka</h1>
<p>Tebak angka dari 1 sampai 10</p>

<input type="number" id="tebak">

<br><br>

<button onclick="cek()">Tebak</button>

<p id="hasil"></p>

<script>

let angka = Math.floor(Math.random()*10)+1;

function cek(){

let t = document.getElementById("tebak").value;

if(t == angka){
document.getElementById("hasil").innerHTML="🎉 Benar!";
}else{
document.getElementById("hasil").innerHTML="❌ Salah!";
}

}

</script>

</body>
</html>
